name: Sync upstream (garrytan/gstack)

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/garrytan/gstack.git || true
          git fetch upstream main

      - name: Check for new commits
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Upstream is $BEHIND commits ahead"

      - name: Attempt merge
        if: steps.check.outputs.behind != '0'
        id: merge
        run: |
          if git merge upstream/main --no-edit; then
            echo "result=clean" >> "$GITHUB_OUTPUT"
          else
            git merge --abort
            echo "result=conflict" >> "$GITHUB_OUTPUT"
          fi

      - name: Push clean merge
        if: steps.merge.outputs.result == 'clean'
        run: git push origin main

      - name: Create PR for conflicts
        if: steps.merge.outputs.result == 'conflict'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto/sync-upstream-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          # Apply upstream as a branch so the diff is reviewable
          git merge upstream/main --no-edit || true

          # Stage the conflict markers so the branch can be pushed
          git add -A
          git commit -m "chore: upstream sync with conflicts (needs manual resolution)" || true
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: sync upstream (conflicts need resolution)" \
            --body "$(cat <<'EOF'
          ## Upstream sync — manual resolution needed

          Automatic merge from `garrytan/gstack` main had conflicts.

          The conflicting files likely overlap with our orch customizations in:
          - `plan-ceo-review/SKILL.md.tmpl`
          - `plan-eng-review/SKILL.md.tmpl`
          - `scripts/gen-skill-docs.ts`
          - `orch/`

          ### How to resolve
          1. Check out this branch locally
          2. Resolve the conflict markers (`<<<<<<<` / `>>>>>>>`)
          3. Ensure orch handoff sections are preserved
          4. Merge the PR

          🤖 Auto-generated by sync-upstream workflow
          EOF
          )" \
            --base main \
            --head "$BRANCH"
