[computed]
entry_points      = ["U01", "U02", "U03"]   # Layer 0: no dependencies, start here
leaf_nodes        = ["U21"]                  # Layer 4: nothing blocks on U21
critical_path     = ["U02", "U04", "U08", "U20", "U21"]
# Rationale: U02 (preamble) → U04 (review) → U08 (ship tmpl, most complex) → U20 (regen) → U21 (measure)
# This is the longest dependency chain and the highest-LOC path through the graph.
critical_path_loc = 1190   # |U02|+|U04|+|U08|+|U20|+|U21| = 319+321+232+0+50 = 922 changed LOC

[computed.max_parallel]
layer_0 = 3   # U01, U02, U03 — fully independent
layer_1 = 4   # U04, U05, U06, U07 — all depend only on U02 (same layer-0 output)
layer_2 = 6   # U08-U13 — all depend on layer-1 resolvers; U12 additionally waits on U11
layer_3 = 5   # U14, U15, U16, U17, U18 fully parallel; U19 waits on U18
layer_4 = 1   # U20 then U21 — strictly sequential (U21 needs U20's output)

[computed.conflict_groups]
# Units that share preamble.ts output and may produce SKILL.md fixture conflicts
resolver_consumers = ["U04", "U05", "U06", "U07"]
# All depend on preamble.ts (U02) — if U02 changes path interpolation patterns,
# all four resolver snapshot fixtures diverge simultaneously. Implement U02 first,
# update fixtures once, then proceed with U04-U07 in parallel.

template_consumers = ["U08", "U09", "U10", "U11", "U12", "U13"]
# All six templates include {{PREAMBLE}} and thus depend on U02's generated output.
# If U02 changes the preamble bash block, all six SKILL.md snapshots change.
# Coordinate fixture updates in U20 rather than six separate fixture commits.

autoplan_ceo_coupling = ["U11", "U12"]
# autoplan (U12) references plan-ceo-review section names. If U11 renames sections,
# U12 must be updated in the same commit to avoid a broken intermediate state.

