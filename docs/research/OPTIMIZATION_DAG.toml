[units.U21]
name            = "Measure before/after token counts, produce summary report"
summary         = "Measure token counts for all optimized files before and after. Use tiktoken (cl100k_base) or equivalent. Update evidence-matrix.toml (U17) with actuals. Produce a summary report as a markdown table showing: file, before LOC, after LOC, LOC delta, before tokens, after tokens, token delta, % reduction."
layer           = 4
tier            = "gate"
status          = "pending"
depends_on      = ["U01", "U02", "U03", "U04", "U05", "U06", "U07", "U08", "U09", "U10", "U11", "U12", "U13", "U14", "U15", "U16", "U17", "U18", "U19", "U20"]
blocks          = []
estimated_loc   = 50   # measurement script
spec_sections   = ["§5.5 Evidence Matrix", "§8 Measurement Methodology"]
spec_anchors    = ["#evidence-matrix", "#measurement"]
files_modify    = ["/tmp/gstack-token-opt/docs/research/evidence-matrix.toml"]
files_create    = ["/tmp/gstack-token-opt/docs/research/token-reduction-summary.md"]
acceptance      = [
  "evidence-matrix.toml updated with actual before/after token counts (not estimates)",
  "token-reduction-summary.md exists with markdown table covering all 13 optimized files",
  "Summary table has columns: File, Before LOC, After LOC, ΔLOC, Before Tokens, After Tokens, ΔTokens, % Reduction",
  "Aggregate row shows total across all files",
  "Token counting method documented in summary header",
  "Measurement covers both .ts resolver files and .tmpl template files",
  "Note distinguishes template token cost (at gen time) vs runtime token cost (at invocation time, after resolver expansion)",
  "All acceptance criteria from U01-U13 referenced and confirmed passing",
]
produces        = [
  "updated evidence-matrix.toml with actual measurements",
  "token-reduction-summary.md (final evidence artifact for PR)",
]
consumes        = [
  "All optimized files (U01-U13 outputs)",
  "All meta artifacts (U14-U19 outputs)",
  "Regenerated SKILL.md files (U20 output)",
  "evidence-matrix.toml U17 (pre-measurement estimates to compare against actuals)",
]
critical_decisions = [
  "Token counting tool: tiktoken Python library, custom script, or claude-tokenizer npm package",
  "Whether to measure .tmpl files (development cost) or generated SKILL.md files (runtime cost) or both",
  "How to present the resolver expansion factor (a .tmpl with {{PREAMBLE}} expands to many more tokens at runtime)",
]
constraints     = [
  "Measurement must be reproducible — anyone with the repo can rerun and get the same counts",
  "Must measure the same set of files as the before-baseline (same method, same tokenizer)",
  "Summary report must be included in the optimization PR body",
]
failure_modes   = [
  "Before measurements taken from estimates rather than actuals — comparison is misleading",
  "Tokenizer mismatch between before/after measurement (e.g. cl100k_base vs o200k_base)",
  "Generated SKILL.md not measured — understates actual runtime token savings",
]
rationale       = "Without measurement, the optimization is unverified. The summary report is the deliverable that proves the work achieved its goals and justifies the PR merge."

